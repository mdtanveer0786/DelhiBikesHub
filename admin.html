<!DOCTYPE html>
<html>
<head>
    <title>Admin - DelhiBikesHub</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .stats { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-box { background: #f5f5f5; padding: 20px; border-radius: 5px; flex: 1; }
        .data-section { margin: 30px 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #1E88E5; color: white; }
        tr:nth-child(even) { background: #f9f9f9; }
        .actions { margin: 20px 0; }
        button { padding: 10px 20px; margin-right: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>DelhiBikesHub Admin Panel</h1>
        
        <div class="stats">
            <div class="stat-box">
                <h3>Total Users</h3>
                <p id="totalUsers">0</p>
            </div>
            <div class="stat-box">
                <h3>Total Bikes</h3>
                <p id="totalBikes">0</p>
            </div>
            <div class="stat-box">
                <h3>Current User</h3>
                <p id="currentUser">None</p>
            </div>
        </div>
        
        <div class="actions">
            <button onclick="refreshData()">Refresh Data</button>
            <button onclick="exportData()" style="background: #4CAF50; color: white;">Export Data</button>
            <button onclick="clearData()" style="background: #f44336; color: white;">Clear All Data</button>
        </div>
        
        <div class="data-section">
            <h2>Registered Users</h2>
            <table id="usersTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Location</th>
                        <th>Join Date</th>
                    </tr>
                </thead>
                <tbody id="usersBody"></tbody>
            </table>
        </div>
        
        <div class="data-section">
            <h2>Bike Listings</h2>
            <table id="bikesTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Type</th>
                        <th>Brand</th>
                        <th>Model</th>
                        <th>Year</th>
                        <th>Price</th>
                        <th>Location</th>
                        <th>Seller</th>
                    </tr>
                </thead>
                <tbody id="bikesBody"></tbody>
            </table>
        </div>
    </div>
    
    <script>
        function loadData() {
            // Load users
            const users = JSON.parse(localStorage.getItem('delhibikeshub_users')) || [];
            document.getElementById('totalUsers').textContent = users.length;
            
            let usersHTML = '';
            users.forEach(user => {
                usersHTML += `
                    <tr>
                        <td>${user.id}</td>
                        <td>${user.name}</td>
                        <td>${user.email}</td>
                        <td>${user.phone}</td>
                        <td>${user.location}</td>
                        <td>${new Date(user.joinDate).toLocaleDateString()}</td>
                    </tr>
                `;
            });
            document.getElementById('usersBody').innerHTML = usersHTML;
            
            // Load bikes
            const bikes = JSON.parse(localStorage.getItem('delhibikeshub_bikes')) || [];
            document.getElementById('totalBikes').textContent = bikes.length;
            
            let bikesHTML = '';
            bikes.forEach(bike => {
                bikesHTML += `
                    <tr>
                        <td>${bike.id}</td>
                        <td>${bike.type}</td>
                        <td>${bike.brand}</td>
                        <td>${bike.model}</td>
                        <td>${bike.year}</td>
                        <td>₹${bike.price}</td>
                        <td>${bike.locality}</td>
                        <td>${bike.sellerName}</td>
                    </tr>
                `;
            });
            document.getElementById('bikesBody').innerHTML = bikesHTML;
            
            // Load current user
            const currentUser = JSON.parse(localStorage.getItem('delhibikeshub_currentUser'));
            if (currentUser) {
                document.getElementById('currentUser').textContent = `${currentUser.name} (${currentUser.email})`;
            }
        }
        
        function refreshData() {
            loadData();
            alert('Data refreshed!');
        }
        
        function exportData() {
            const users = JSON.parse(localStorage.getItem('delhibikeshub_users')) || [];
            const bikes = JSON.parse(localStorage.getItem('delhibikeshub_bikes')) || [];
            
            const data = {
                users: users,
                bikes: bikes,
                exportDate: new Date().toISOString()
            };
            
            const dataStr = JSON.stringify(data, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
            
            const exportFileDefaultName = 'delhibikeshub_data.json';
            
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();
        }
        
        function clearData() {
            if (confirm('Are you sure you want to delete ALL data? This cannot be undone!')) {
                localStorage.clear();
                alert('All data has been cleared!');
                loadData();
            }
        }
        
        // Load data on page load
        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
