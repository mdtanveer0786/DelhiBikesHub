<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    
    <!-- SEO Meta Tags -->
    <title>DelhiBikesHub — Buy & Sell Used Bikes & Scooties in Delhi</title>
    <meta name="description" content="Delhi's #1 marketplace for buying and selling pre-owned bikes and scooties. Find verified listings from trusted sellers across Delhi's top localities like Karol Bagh, Rohini, Dwarka, and more." />
    <meta name="keywords" content="used bikes Delhi, second hand scooty Delhi, buy bike Delhi, sell bike Delhi, pre-owned bikes, DelhiBikesHub" />
    <meta name="author" content="Md Tanveer Alam" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="DelhiBikesHub — Buy & Sell Used Bikes in Delhi" />
    <meta property="og:description" content="Find the best deals on pre-owned bikes and scooties across Delhi. Verified listings, honest prices." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://delhibikeshub.vercel.app" />
    <meta property="og:image" content="/images/hero-bg.jpg" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DelhiBikesHub — Used Bikes & Scooties Marketplace" />
    <meta name="twitter:description" content="Delhi's trusted marketplace for pre-owned bikes and scooties." />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#d946ef" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet" />
    <link rel="preconnect" href="https://res.cloudinary.com" />
    
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "DelhiBikesHub",
      "url": "https://delhibikeshub.vercel.app",
      "description": "Delhi's marketplace for buying and selling used bikes and scooties",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://delhibikeshub.vercel.app/bikes?model={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
